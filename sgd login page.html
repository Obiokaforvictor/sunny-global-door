<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sunny Global Door Login</title>
  <link rel="stylesheet" href="./sgd login page.css">
</head>
<body>

  <div class="card">

    <!-- LEFT: Form -->
    <div class="form-side">

      <div class="logo">
        <span class="logo-icon"></span>
        <div>
          <div class="company-name">SUNNY GLOBAL DOOR</div>
          <div class="company-sub">Stylish Living</div>
        </div>
      </div>

      <h1>Welcome <span>Home</span></h1>
      <p class="subtitle">Please enter your details.</p>

      <div class="divider-bar"></div>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" />

      <div class="row-opts">
        <label class="remember">
          <input type="checkbox" /> Remember for 30 days
        </label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <button class="btn-login">Login</button>

      <div class="or-row">
        <hr /><span>or</span><hr />
      </div>

      <div class="social-row">
        <a href="https://wa.me/2348108123223" target="_blank" class="social-btn whatsapp">
          <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/whatsapp.svg" alt="WhatsApp" />
          WhatsApp
        </a>
        <a href="https://instagram.com/obitex_jnr" target="_blank" class="social-btn instagram">
          <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg" alt="Instagram" />
          Instagram
        </a>
        <a href="https://google.com" target="_blank" class="social-btn google">
          <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/google.svg" alt="Google" />
          Google
        </a>
      </div>

    </div>

    <div class="visual-side">
      <div class="door-art"><img src="./sun logo 1.png" height="280px" width="500px" alt=""></div>
      <div class="visual-quote">Open The Door To<br/><em>Stylish Living</em></div>
      <div class="visual-brand">Sunny Global Door &copy; 2025</div>
    </div>

  </div>

</body>
</html>
